<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>在庫管理アプリ</title>

<!-- PWA設定 -->
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#111827">

<!-- iPhone対策 -->
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="在庫管理">

<style>
body{font-family:sans-serif;background:#f4f7fb;margin:0;padding:16px;}
.card{background:#fff;padding:12px;border-radius:12px;margin-bottom:10px;}
.best{border:2px solid #16a34a;background:#ecfdf5;}
button{padding:8px;margin:4px;border:none;border-radius:8px;background:#111;color:#fff;}
input{width:100%;padding:8px;margin:4px 0;}
</style>
</head>

<body>

<h2>在庫管理アプリ</h2>

<div class="card">
<input id="name" placeholder="商品名">
<input id="barcode" placeholder="バーコード">
<input id="price" type="number" placeholder="価格">
<input id="volume" type="number" placeholder="内容量">

<button onclick="save()">保存</button>
<button onclick="startScan()">バーコード読取</button>
</div>

<div id="result"></div>
<div id="list"></div>

<script>

let items = JSON.parse(localStorage.getItem("items")||"[]");

function save(){
  let item={
    id:Date.now(),
    name:name.value,
    barcode:barcode.value,
    price:+price.value,
    volume:+volume.value
  };
  items.push(item);
  localStorage.setItem("items",JSON.stringify(items));
  render();
}

function unit(i){
  if(!i.price||!i.volume)return null;
  return (i.price/i.volume).toFixed(3);
}

function render(){
  let min=Math.min(...items.map(i=>unit(i)||999999));

  list.innerHTML=items.map(i=>{
    let u=unit(i);
    let best=(u==min);
    return `<div class="card ${best?'best':''}">
      ${i.name}<br>
      1mL:${u}円
    </div>`;
  }).join("");
}

async function startScan(){
  if(!("BarcodeDetector" in window)){
    alert("非対応");
    return;
  }

  let stream=await navigator.mediaDevices.getUserMedia({video:true});
  let video=document.createElement("video");
  video.srcObject=stream;
  video.play();

  let detector=new BarcodeDetector();

  setInterval(async()=>{
    let codes=await detector.detect(video);
    if(codes.length){
      let code=codes[0].rawValue;
      barcode.value=code;

      let found=items.find(i=>i.barcode==code);
      if(found){
        name.value=found.name;
        price.value=found.price;
        volume.value=found.volume;
        result.innerHTML="自動認識："+found.name;
      }else{
        result.innerHTML="未登録バーコード";
      }

      stream.getTracks().forEach(t=>t.stop());
    }
  },500);
}

render();

</script>

<!-- Service Worker -->
<script>
if('serviceWorker'in navigator){
 navigator.serviceWorker.register('service-worker.js');
}
</script>

</body>
</html>
